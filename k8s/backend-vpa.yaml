apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: mini-helpdesk-backend-vpa
  namespace: mini-helpdesk
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mini-helpdesk-backend
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        controlledResources: ["memory"]
        controlledValues: RequestsAndLimits
        minAllowed:
          memory: "128Mi"
        maxAllowed:
          memory: "512Mi"